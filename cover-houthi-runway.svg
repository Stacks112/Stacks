<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="Editorial illustration: aircraft on a runway at dusk with a rising smoke plume">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#05070D"/>
      <stop offset="0.55" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#141A2E"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.34" r="0.5">
      <stop offset="0" stop-color="#7C93FF" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#7C93FF" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#7C93FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="smoke" x1="0" y1="1" x2="0.3" y2="0">
      <stop offset="0" stop-color="#2A3550" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#2A3550" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A0E18"/>
      <stop offset="1" stop-color="#05070D"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect width="1200" height="675" fill="url(#sky)"/>
  <circle cx="864" cy="230" r="320" fill="url(#glow)"/>

  <!-- stars -->
  <g fill="#AEB8D8" opacity="0.5">
    <circle cx="140" cy="90" r="1.6"/><circle cx="320" cy="140" r="1.2"/><circle cx="520" cy="70" r="1.4"/>
    <circle cx="1040" cy="120" r="1.3"/><circle cx="1130" cy="60" r="1.6"/><circle cx="240" cy="220" r="1.1"/>
    <circle cx="700" cy="120" r="1.2"/><circle cx="960" cy="80" r="1.2"/>
  </g>

  <!-- ground / apron -->
  <rect y="470" width="1200" height="205" fill="url(#ground)"/>
  <!-- runway receding centerline -->
  <polygon points="470,675 730,675 640,478 560,478" fill="#10151F"/>
  <g>
    <rect x="596" y="486" width="8" height="26" fill="#6C7CB8" opacity="0.8"/>
    <rect x="592" y="524" width="10" height="30" fill="#6C7CB8" opacity="0.75"/>
    <rect x="586" y="566" width="14" height="34" fill="#6C7CB8" opacity="0.7"/>
    <rect x="578" y="612" width="18" height="40" fill="#6C7CB8" opacity="0.65"/>
  </g>
  <!-- edge lights -->
  <g fill="#7C93FF">
    <circle cx="470" cy="672" r="4"/><circle cx="500" cy="600" r="3.4"/><circle cx="525" cy="545" r="3"/><circle cx="545" cy="500" r="2.6"/>
    <circle cx="730" cy="672" r="4"/><circle cx="700" cy="600" r="3.4"/><circle cx="675" cy="545" r="3"/><circle cx="655" cy="500" r="2.6"/>
  </g>

  <!-- smoke plume (editorial, restrained) -->
  <path d="M792 470 C 770 400, 830 360, 800 300 C 780 260, 830 235, 815 195 C 808 176, 828 165, 826 150 L 900 150 C 905 180, 872 205, 888 250 C 900 288, 858 315, 878 360 C 892 396, 852 430, 872 470 Z" fill="url(#smoke)"/>

  <!-- aircraft silhouette on the ground, tilted -->
  <g transform="translate(600 452) rotate(-4)" fill="#0A0D14" stroke="#3B486B" stroke-width="2">
    <!-- fuselage -->
    <path d="M-230 0 C -230 -14, -180 -22, -120 -24 L 150 -24 C 205 -24, 250 -16, 262 -6 C 268 -1, 268 3, 262 6 L 150 12 L -120 12 C -180 10, -230 8, -230 0 Z"/>
    <!-- tail fin -->
    <path d="M170 -24 L 210 -70 L 232 -70 L 214 -24 Z"/>
    <!-- wing -->
    <path d="M-30 8 L 60 8 L 150 40 L 40 40 Z" fill="#0C1019"/>
  </g>
  <!-- windows -->
  <g fill="#7C93FF" opacity="0.55">
    <circle cx="430" cy="440" r="2.4"/><circle cx="452" cy="439" r="2.4"/><circle cx="474" cy="438" r="2.4"/>
    <circle cx="496" cy="437" r="2.4"/><circle cx="518" cy="436" r="2.4"/><circle cx="540" cy="435" r="2.4"/>
  </g>

  <!-- caption strip -->
  <g>
    <rect x="0" y="596" width="1200" height="79" fill="#000000" opacity="0.34"/>
    <text x="64" y="636" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Segoe UI', sans-serif" font-size="30" font-weight="800" fill="#F2F3F7">후티, 사우디 해상봉쇄 선언</text>
    <text x="64" y="662" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#9BA1B0">사나 공항 활주로 피격 이후, 원유의 마지막 우회로가 위협받다</text>
  </g>
</svg>
