<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>chart embed test</title>
<style>body{margin:0;background:#111;color:#eee;font-family:monospace}h3{padding:8px 12px;margin:0}.box{height:460px;border-bottom:2px solid #444}</style>
</head>
<body>
<h3>A. script-embed NASDAQ:NVDA</h3>
<div class="box"><div class="tradingview-widget-container" style="height:100%;width:100%">
  <div class="tradingview-widget-container__widget" style="height:100%;width:100%"></div>
  <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
  {
  "autosize": true,
  "symbol": "NASDAQ:NVDA",
  "interval": "D",
  "timezone": "Asia/Seoul",
  "theme": "dark",
  "style": "1",
  "locale": "kr",
  "allow_symbol_change": true,
  "withdateranges": true,
  "support_host": "https://www.tradingview.com"
  }
  </script>
</div></div>
<h3>B. script-embed KRX:000660</h3>
<div class="box"><div class="tradingview-widget-container" style="height:100%;width:100%">
  <div class="tradingview-widget-container__widget" style="height:100%;width:100%"></div>
  <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
  {
  "autosize": true,
  "symbol": "KRX:000660",
  "interval": "D",
  "timezone": "Asia/Seoul",
  "theme": "dark",
  "style": "1",
  "locale": "kr",
  "allow_symbol_change": true,
  "withdateranges": true,
  "support_host": "https://www.tradingview.com"
  }
  </script>
</div></div>
<h3>C. iframe widgetembed NASDAQ:NVDA</h3>
<div class="box"><iframe style="width:100%;height:100%;border:0" src="https://s.tradingview.com/widgetembed/?frameElementId=tvtest&symbol=NASDAQ%3ANVDA&interval=D&theme=dark&style=1&locale=kr&withdateranges=1"></iframe></div>
</body>
</html>
