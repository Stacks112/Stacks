# Stacks Scout — draft cards from feeds with Claude and AUTO-PUBLISH to the site.
# Runs after feed-sync populates feeds/. Commits straight to main (no review gate):
#   scout.py writes items.json, build_pages.py regenerates the static pages,
#   everything is committed and pushed. Sole publisher of items.json.
name: Stacks Scout (auto-publish)

on:
  schedule:
    - cron: "30 */3 * * *"   # every 3h at :30 (feed-sync runs hourly at :17)
  workflow_dispatch:
    inputs:
      max_new:
        description: "Max new cards this run"
        required: false
        default: "3"

permissions:
  contents: write

concurrency:
  group: stacks-scout
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Draft cards, then rebuild pages if anything new
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MODEL: claude-sonnet-5
          MAX_NEW_ITEMS: ${{ github.event.inputs.max_new || '3' }}
          LOOKBACK_DAYS: "4"
          PER_SOURCE_CAP: "2"
        run: |
          python scripts/scout.py
          if git diff --quiet -- items.json; then
            echo "No new cards this run — skipping build."
            exit 0
          fi
          python scripts/build_pages.py

      - name: Publish to main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- items.json; then
            echo "Nothing to publish."
            exit 0
          fi
          rm -f .scout_pr_body.md
          git config user.name  "stacks-scout[bot]"
          git config user.email "stacks-scout[bot]@users.noreply.github.com"
          git add -A
          git commit -m "content: auto-publish scout cards"
          git pull --rebase origin main
          git push origin main
